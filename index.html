<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>david school</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/img/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main>
      <section id="main">
        <aside>
          <div id="logo">
            <img src="/img/logo.svg" alt="" />
          </div>
        </aside>
        <article id="left">
          <section>
            <h1>Check your Grade</h1>
            <form>
              <div>
                <p><label for="name">Student Name</label></p>
                <div class="input">
                  <label
                    for="name
          "
                    class="inside"
                    ><i class="bi bi-person-circle"></i
                  ></label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="your name here"
                    autocomplete="on"
                  />
                </div>
              </div>
              <div>
                <p><label for="score">Student Score</label></p>

                <div class="input">
                  <label
                    for="score
          "
                    class="inside"
                    ><i class="bi bi-check2-circle"></i
                  ></label>
                  <input
                    type="text"
                    id="score"
                    name="score"
                    placeholder="your score here"
                    autocomplete="on"
                  />
                </div>
              </div>
              <div>
                <p><label for="image">Student Image URL</label></p>
                <div class="input">
                  <label
                    for="image
          "
                    class="inside"
                    ><i class="bi bi-image"></i
                  ></label>
                  <input
                    type="text"
                    id="image"
                    name="image"
                    placeholder="your image here"
                    autocomplete="on"
                  />
                </div>
              </div>
              <div>
                <button id="modal-open">Check result</button>
              </div>
            </form>
          </section>
          <section class="circle">
            <div id="big-circle"></div>
            <div id="small-circle"></div>
          </section>
        </article>
      </section>
    </main>

    <article id="modal" class="modal">
      <section id="modal-in" class="slide">
        <div id="m-logo">
          <img id="img" src="" alt="" />
        </div>
        <div id="l-modal">
          <button id="m-close"><i class="bi bi-x-circle"></i></button>
          <div id="t-modal">
            <div>
              <i class="bi bi-person-square"></i>
              <p id="m-name"></p>
            </div>
            <div>
              <i class="bi bi-check-circle-fill"></i>
              <p id="m-score">78</p>
            </div>
            <div>
              <i class="bi bi-file-bar-graph"></i>
              <p id="m-grade"></p>
            </div>
            <div>
              <i class="bi bi-substack"></i>
              <p id="m-status"></p>
            </div>
          </div>
        </div>
      </section>
    </article>
    <script src="index.js"></script>
  </body>
</html>
