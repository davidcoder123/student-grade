<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>david school</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="/img/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <main>
      <section id="main">
        <aside>
          <div id="logo">
            <img src="/img/logo.svg" alt="" />
          </div>
        </aside>
        <article id="left">
          <section>
            <h1>Check your Grade</h1>
            <form>
              <div>
                <p><label for="name">Student Name</label></p>
                <div class="input">
                  <label
                    for="name
          "
                    class="inside"
                    ><i class="bi bi-person-circle"></i
                  ></label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="your name here"
                  />
                </div>
              </div>
              <div>
                <p><label for="score">Student Score</label></p>

                <div class="input">
                  <label
                    for="score
          "
                    class="inside"
                    ><i class="bi bi-check2-circle"></i
                  ></label>
                  <input
                    type="text"
                    id="score"
                    name="score"
                    placeholder="your score here"
                  />
                </div>
              </div>
              <div>
                <p><label for="image">Student Image URL</label></p>
                <div class="input">
                  <label
                    for="image
          "
                    class="inside"
                    ><i class="bi bi-image"></i
                  ></label>
                  <input
                    type="text"
                    id="image"
                    name="image"
                    placeholder="your image here"
                  />
                </div>
              </div>
              <div>
                <button>Check result</button>
              </div>
            </form>
          </section>
        </article>
      </section>
    </main>
    <article id="modal">
      <section>
        <div id="m-logo"></div>
        <div id="l-modal">
          <button id="m-close"><i class="bi bi-x-circle"></i></button>
          <div>
            <p id="m-name">w</p>
            <p id="m-score">w</p>
            <p id="m-grade">w</p>
          </div>
        </div>
      </section>
    </article>
  </body>
</html>
